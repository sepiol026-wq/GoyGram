name: pub
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  lnx:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tgt: [x86_64, aarch64, armv7, i686, ppc64le, s390x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.tgt }}
          args: --release --out d
          sccache: 'true'
          manylinux: auto
      - uses: PyO3/maturin-action@v1
        if: ${{ matrix.tgt == 'x86_64' || matrix.tgt == 'aarch64' || matrix.tgt == 'armv7' || matrix.tgt == 'i686' }}
        with:
          target: ${{ matrix.tgt }}
          args: --release --out d
          sccache: 'true'
          manylinux: musllinux_1_1
      - uses: actions/upload-artifact@v4
        with:
          name: whl-lnx-${{ matrix.tgt }}
          path: d
  win:
    runs-on: windows-latest
    strategy:
      matrix:
        tgt: [x64, x86, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.tgt }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.tgt }}
          args: --release --out d
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: whl-win-${{ matrix.tgt }}
          path: d
  mac:
    runs-on: macos-latest
    strategy:
      matrix:
        tgt: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.tgt }}
          args: --release --out d
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: whl-mac-${{ matrix.tgt }}
          path: d
  bsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tgt: [x86_64-unknown-freebsd]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.tgt }}
          args: --release --out d --zig
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: whl-bsd-x86_64
          path: d
  src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out d
      - uses: actions/upload-artifact@v4
        with:
          name: whl-src
          path: d
  pub:
    runs-on: ubuntu-latest
    needs: [lnx, win, mac, bsd, src]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: whl-*
          merge-multiple: true
          path: d
      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing d/*
