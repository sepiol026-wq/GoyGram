name: pub
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: lnx
          - os: windows-latest
            name: win
          - os: macos-latest
            name: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out d
      - uses: actions/upload-artifact@v4
        with:
          name: whl-${{ matrix.name }}
          path: d

  src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out d
      - uses: actions/upload-artifact@v4
        with:
          name: whl-src
          path: d

  pub:
    runs-on: ubuntu-latest
    needs: [build, src]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: whl-*
          merge-multiple: true
          path: d
      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing d/*
